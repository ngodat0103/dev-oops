name: PostgreSQL Backup Test

on:
  schedule:
    - cron: "0 3 1,15 * *"
  workflow_dispatch:
    inputs:
      region:
        description: "DOKS region"
        default: "nyc3"
        required: false
      node_size:
        description: "DOKS node size slug"
        default: "s-4vcpu-8gb"
        required: false
      node_count:
        description: "Number of DOKS nodes"
        default: "2"
        required: false

jobs:
  backup-test:
    runs-on: ubuntu-latest
    environment: test-backup
    timeout-minutes: 45
    steps:
      # --- dependency setup only; no business logic lives here ---
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/download/v3.3.4/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      # helm, kubectl, and jq are preinstalled on ubuntu-latest runners.

      # --- delegate all logic to the bash scripts ---
      - name: Run DR drill
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          RUN_ID: ${{ github.run_id }}
          REGION: ${{ inputs.region || 'nyc3' }}
          NODE_SIZE: ${{ inputs.node_size || 's-4vcpu-8gb' }}
          NODE_COUNT: ${{ inputs.node_count || '2' }}
        run: |
          chmod +x dr-drill/run.sh dr-drill/scripts/*.sh
          ./dr-drill/run.sh