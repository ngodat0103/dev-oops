#yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/mongodbcommunity.mongodb.com/mongodbcommunity_v1.json
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: shared-mongodb
spec:
  arbiters: 1
  members: 2
  type: "ReplicaSet"
  version: "8.2.1"
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: akira
      db: admin
      passwordSecretRef:
        name: akira-db-password
      roles:
        - name: readWrite
          db: akira
      scramCredentialsSecretName: mongodb-app-scram
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib
    storage.wiredTiger.engineConfig.cacheSizeGB: 0.256
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: "100m"
                  memory: "450Mi"
                limits:
                  cpu: "500m"
                  memory: "450Mi"
            - name: mongodb-agent
              resources:
                requests:
                  cpu: "100m"
                  memory: "50Mi"
                limits:
                  cpu: "500m"
                  memory: "100Mi"
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 30Gi