apiVersion: v1
kind: ConfigMap
metadata:
   name: coredns
   namespace: kube-system
   labels:
      # IMPORTANT: Change this to match the name of your ArgoCD Application
      # Keeping your original label, but see my warning below!
      addonmanager.kubernetes.io/mode: EnsureExists
data:
   Corefile: |
      .:53 {
          errors {
          }
          health {
              lameduck 5s
          }
          ready
          kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
          }
          prometheus :9153
          forward . /etc/resolv.conf {
            prefer_udp
            max_concurrent 1000
          }
          cache 30

          loop
          reload
          loadbalance
          hosts {
              192.168.1.121 gitlab.datrollout.dev
              fallthrough
          }
          # -------------------------------
      }
