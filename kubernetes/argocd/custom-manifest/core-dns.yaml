apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
  labels:
    # IMPORTANT: Change this to match the name of your ArgoCD Application
    # Keeping your original label, but see my warning below!
    addonmanager.kubernetes.io/mode: EnsureExists
data:
  Corefile: |
    .:53 {
      errors
      log . {
          class denial error
      }
      health {
          lameduck 5s
      }
      ready
      kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods verified
          fallthrough in-addr.arpa ip6.arpa
      }
      prometheus :9153
      forward . 1.1.1.1 8.8.8.8 {
          max_concurrent 2000
      }
      cache 120
      loop
      reload
      loadbalance
    }
