# Source: argocd-app-of-apps/templates/alloy.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  revisionHistoryLimit: 3
  destination:
    namespace: alloy
    name: in-cluster
  syncPolicy:
    syncOptions: [ "CreateNamespace=true","ServerSideApply=true" ]
    automated:
      enabled: true
      prune: true
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 0.9.0
    chart: alloy
    helm:
      values: |
        alloy:
          configMap:
            create: false
          clustering:
            enabled: false
          mounts:
            dockercontainers: true
            varlogcontainers: true
            varlogpods: true
            varlibdockercontainers: true
        controller:
          type: 'daemonset'
        alloy:
          config: |
            logging {
              level = "info"
              format = "logfmt"
            }

            loki.source.kubernetes "pods" {
              targets = discovery.kubernetes "pods" {
                role = "pod"
              }
              forward_to = [loki.write.endpoint.receiver]
            }

            loki.source.kubernetes_events "events" {
              job_name   = "kubernetes-events"
              namespaces = []
              forward_to = [loki.write.endpoint.receiver]
            }

            loki.write "endpoint" {
              endpoint {
                url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
              }
            }
