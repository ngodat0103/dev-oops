# Source: argocd-app-of-apps/templates/velero.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  revisionHistoryLimit: 3
  destination:
    namespace: velero
    name: in-cluster
  syncPolicy:
    syncOptions: [ "CreateNamespace=true" ]
    automated:
      enabled: false
      selfHeal: false
      prune: false
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts/
    targetRevision: 12.0.0
    chart: velero
    # https://artifacthub.io/packages/helm/vmware-tanzu/velero
    helm:
     values: |
      initContainers:
        - name: velero-plugin-for-aws
          image: velero/velero-plugin-for-aws:v1.13.1
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /target
              name: plugins
      deployNodeAgent: true
      configuration:
        volumeSnapshotLocation: []
        backupStorageLocation:
          - name: r2-cloudflare
            provider: aws
            bucket: velero-storage-prod
            default: true
            accessMode: ReadWrite
            config:
              region: auto
              s3ForcePathStyle: 'true'
              s3Url: https://4c8ad4e9fa8213af3fd284bb97b68b5e.r2.cloudflarestorage.com
            credential:
              name: velero-secret
              key: r2-cloudflare
