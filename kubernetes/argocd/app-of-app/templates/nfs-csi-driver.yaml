{{- if and (.Values.nfsCsiDriver) (.Values.nfsCsiDriver.enabled) -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-driver-nfs
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated:
      enabled: false
  destination:
    namespace: kube-system
    name: in-cluster
  source:
    repoURL: https://github.com/kubernetes-csi/csi-driver-nfs.git
    targetRevision: "v4.13.2"
    path: deploy
    directory:
      exclude: "{csi-nfs-node-windows.yaml,storageclass.yaml}" # Don't need StorageClass, I rather to configure manually to control
{{- end }}
