{{- if and (.Values.chaosMesh) (.Values.chaosMesh.enabled) -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chaos-mesh
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    applicationType: daemon
spec:
  project: default
  syncPolicy:
    syncOptions: [ "CreateNamespace=true","ServerSideApply=true" ]
    automated:
      enabled: false
  destination:
    namespace: chaos-simulation
    name: in-cluster
  sources:
    - repoURL: https://charts.chaos-mesh.org
      chart: chaos-mesh
      targetRevision: 2.8.3
      helm:
        valueFiles:
          - $config/kubernetes/argocd/argocd-app/stateful/chaos-mesh/values.yaml
    - repoURL: https://github.com/ngodat0103/home-lab.git
      targetRevision: master
      ref: config
{{- end }}
