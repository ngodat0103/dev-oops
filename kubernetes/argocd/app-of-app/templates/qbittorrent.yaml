{{- if and (.Values.qbittorrent) (.Values.qbittorrent.enabled) -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qbittorrent
  namespace: argocd
  labels:
    applicationType: stateful
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    automated:
      enabled: false
      prune: false
      selfHeal: false
  destination:
    namespace: qbittorrent
    name: in-cluster
  source:
    directory:
      recurse: false
    repoURL: https://github.com/ngodat0103/home-lab.git
    targetRevision: master
    path: kubernetes/argocd/argocd-app/stateful/qbittorrent
{{- end }}
