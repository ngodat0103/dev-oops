{{- if and (.Values.juicefs) (.Values.juicefs.enabled) -}}
apiVersion: "argoproj.io/v1alpha1"
kind: Application
metadata:
  name: juicefs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: default
  syncPolicy:
    automated:
      enabled: false
      selfHeal: false
      prune: true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  destination:
    namespace: juicefs
    name: in-cluster
  source:
    repoURL: https://charts.wener.tech
    chart: juicefs-csi-driver
    targetRevision: 0.31.4
    # https://artifacthub.io/packages/helm/wener/juicefs-csi-driver?modal=values
    helm:
      values: |
        mountMode: mountpod
        webhook:
          certManager:
            enabled: false
        controller:
          replicas: 1
        storageClasses:
          - name: "juicefs-sc-cloudflare-r2"
            enabled: true
            existingSecret: "cloudflare-r2"
            reclaimPolicy: Retain
            allowVolumeExpansion: true
            mountPod:
              resources:
                limits:
                  cpu: 100m
                  memory: 1Gi
                requests:
                  cpu: 100m
                  memory: 512Mi
            mountOptions:
              - cache-size=10240
              - free-space-ratio=0.1
              - prefetch=3
              - max-readahead=67108864
              - open-cache=3
              - attr-cache=3
              - entry-cache=3
        dashboard:
          ingress:
            enabled: true
            className: "traefik"
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
            hosts:
             - host: "juicefs.datrollout.dev"
               paths:
                - path: /
                  pathType: ImplementationSpecific
{{- end -}}