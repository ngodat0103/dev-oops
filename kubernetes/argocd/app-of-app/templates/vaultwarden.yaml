{{- if and (.Values.vaultwarden) (.Values.vaultwarden.enabled) -}}
apiVersion: "argoproj.io/v1alpha1"
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
  labels:
    applicationType: stateless
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: default
  syncPolicy:
    automated:
      enabled: false
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  destination:
    namespace: vaultwarden
    name: in-cluster
  sources:
  - repoURL: "https://github.com/ngodat0103/home-lab.git"
    targetRevision: master
    helm:
      valueFiles:
        - values.yaml
        - secrets+age-import:///sops-age/keys.txt?secret.enc.yaml
    path: kubernetes/argocd/argocd-app/stateless/vaultwarden
{{- end -}}