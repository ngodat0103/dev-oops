{{- if and (.Values.harbor) (.Values.harbor.enabled) -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.18.3
    helm:
      values: |
        persistence:
          persistentVolumeClaim:
            registry:
              size: 50G
        externalURL: https://core-harbor.datrollout.dev
        expose:
          type: ingress
          tls:
            enabled: false
          ingress:
            hosts:
              core: core-harbor.datrollout.dev
              notary: notary-harbor.datrollout.dev
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
              traefik.ingress.kubernetes.io/router.middlewares: "traefik-allow-local-ip-only@kubernetescrd"
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
  destination:
    name: in-cluster
    namespace: harbor
  syncPolicy:
    automated:
      enabled: false
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
{{- end -}}