apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  serviceName: jellyfin
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        runAsUser: 1003
        runAsGroup: 1003
        fsGroup: 1003
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: jellyfin-config-pvc
      - name: cache
        emptyDir: {}
      - name: media
        persistentVolumeClaim:
          claimName: jellyfin-media-pvc
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:10.11.8@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37
        resources:
          requests:
            cpu: 2000m
            memory: 512Mi
          limits:
            cpu: 4000m
            memory: 1Gi
        ports:
        - name: http
          containerPort: 8096
        env:
        - name: TZ
          value: Asia/Ho_Chi_Minh
        readinessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
        volumeMounts:
        - name: config
          mountPath: /config
        - name: cache
          mountPath: /cache
        - name: media
          mountPath: /data
          readOnly: true
