apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  replicas: 1
  serviceName: nextcloud
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      automountServiceAccountToken: false
      volumes:
      - name: app
        persistentVolumeClaim:
          claimName: nextcloud-app-pvc
      - name: mnt
        persistentVolumeClaim:
          claimName: nextcloud-mnt-pvc
      containers:
      - name: nextcloud
        image: linuxserver/nextcloud:34.0.1@sha256:397d5e5bdf1d626ab3f160575f6b8415b6479f5f258607c902385e48c92f2045
        resources:
          requests:
            cpu: 1
            memory: 1Gi
          limits:
            cpu: 2
            memory: 1Gi
        ports:
        - name: http
          containerPort: 80
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: Asia/Ho_Chi_Minh
        volumeMounts:
        - name: app
          mountPath: /config
          subPath: config
        - name: app
          mountPath: /data
          subPath: data
        - name: mnt
          mountPath: /mnt
