apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-data1-pv
spec:
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 1Ti
  accessModes:
  - ReadWriteMany
  nfs:
    server: 192.168.1.121
    path: /mnt/data1
