# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:16.13
  affinity: {}
  # According to requirement of Gitlab
  # https://docs.gitlab.com/install/requirements/#postgresql-tuning
  postgresql:
    parameters:
      shared_buffers: "2GB"
      effective_cache_size: "6GB"
      work_mem: "8MB"
      maintenance_work_mem: "256MB"
      max_connections: "400"
      random_page_cost: "1.2"
      effective_io_concurrency: "100"
      checkpoint_completion_target: "0.9"
      log_min_duration_statement: "1000"
      statement_timeout: "0"
      hot_standby_feedback: "on"
  resources:
    requests:
      memory: 6Gi
      cpu: 2
    limits:
      memory: 8Gi
      cpu: 2
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-admin
  monitoring:
    enablePodMonitor: true
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: cloudflare-r2
  backup:
    retentionPolicy: 7d
  managed:
    roles:
    - name: sonarqube
      ensure: present
      comment: Role for Sonarqube
      connectionLimit: 20
      login: true
      superuser: false
      passwordSecret:
        name: sonarqube
    - name: vaultwarden
      ensure: present
      comment: Role for Vaultwarden
      connectionLimit: 5
      login: true
      superuser: false
      passwordSecret:
        name: vaultwarden
    - name: gitlab
      ensure: present
      comment: "Role for Gitlab"
      connectionLimit: 100
      login: true
      superuser: false
      passwordSecret:
        name: gitlab-db
    - name: nextcloud
      comment: Role for nextcloud
      login: true
      superuser: false
      connectionLimit: 30
      ensure: present
      passwordSecret:
        name: nextcloud-db
    - name: juicefs
      login: true
      connectionLimit: 40
      comment: Role for juicefs
      superuser: false
      ensure: present
      passwordSecret:
        name: juicefs
    - name: pgadmin_monitor
      ensure: present
      login: true
      superuser: false
      passwordSecret:
        name: pgadmin-monitor-credentials
      inRoles:
      - pg_monitor
  instances: 1
  storage:
    size: 30Gi
