## https://artifacthub.io/packages/helm/argo/argo-cd/10.1.0?modal=values

dex:
  enabled: false
notifications:
  enabled: false
redis:
  resources:
    requests:
      cpu: 500m
      memory: 64Mi
    limits:
      cpu: 2
      memory: 128Mi
controller:
  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi
repoServer:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 1Gi

  # --- SOPS: init container installs sops + age + helm-secrets ---
  initContainers:
  - name: install-sops-tools
    image: alpine:3.19
    command:
    - sh
    - -c
    - |
      wget -O /custom-tools/sops \
        https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
      chmod +x /custom-tools/sops

      wget -O /tmp/age.tar.gz \
        https://github.com/FiloSottile/age/releases/download/v1.1.1/age-v1.1.1-linux-amd64.tar.gz
      tar xf /tmp/age.tar.gz -C /tmp
      mv /tmp/age/age /custom-tools/
      mv /tmp/age/age-keygen /custom-tools/
      chmod +x /custom-tools/age /custom-tools/age-keygen

      mkdir -p /custom-tools/helm-plugins
      wget -qO- https://github.com/jkroepke/helm-secrets/releases/download/v4.7.6/helm-secrets.tar.gz \
        | tar -C /custom-tools/helm-plugins -xzf-
      cp /custom-tools/helm-plugins/helm-secrets/scripts/wrapper/helm.sh /custom-tools/helm
      chmod +x /custom-tools/helm
    volumeMounts:
    - name: custom-tools
      mountPath: /custom-tools

  env:
  - name: HELM_PLUGINS
    value: /custom-tools/helm-plugins
  - name: HELM_SECRETS_WRAPPER_ENABLED
    value: "true"
  - name: HELM_SECRETS_VALUES_ALLOW_ABSOLUTE_PATH
    value: "true"
  - name: HELM_SECRETS_DECRYPT_SECRETS_IN_TMP_DIR
    value: "true"
  - name: HELM_SECRETS_HELM_PATH
    value: /usr/local/bin/helm
  - name: SOPS_AGE_KEY_FILE
    value: /sops-age/keys.txt

  volumeMounts:
  - name: custom-tools
    mountPath: /custom-tools
  - name: custom-tools
    mountPath: /usr/local/bin/sops
    subPath: sops
  - name: custom-tools
    mountPath: /usr/local/bin/age
    subPath: age
  - name: custom-tools
    mountPath: /usr/local/sbin/helm
    subPath: helm
  - name: sops-age-key
    mountPath: /sops-age
    readOnly: true
  volumes:
  - name: custom-tools
    emptyDir: {}
  - name: sops-age-key
    secret:
      secretName: sops-age-key
  # --- end SOPS ---
server:
  resources:
    requests:
      cpu: 500m
      memory: 128Mi
    limits:
      cpu: 2
      memory: 256Mi
  ingress:
    enabled: true
    controller: generic
    labels: {}
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
      traefik.ingress.kubernetes.io/router.middlewares: "traefik-allow-local-ip-only@kubernetescrd"
global:
  domain: argocd.datrollout.dev
  networkPolicy:
    create: false
configs:
  params:
    server.insecure: true
  tls:
    create: true
  cm:
    # --- SOPS: allow helm-secrets value file schemes ---
    helm.valuesFileSchemes: >-
      secrets+age-import, secrets+age-import-kubernetes, secrets, secrets+literal, https
    resource.exclusions: |
      ### Internal Kubernetes resources excluded reduce the number of watched events
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Request excluded reduce the number of watched events
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest

crds:
  install: true
  keep: false
