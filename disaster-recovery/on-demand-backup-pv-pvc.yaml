apiVersion: velero.io/v1
kind: Backup
metadata:
  name: pv-pvc-manifest-ondemand-3
  namespace: velero
spec:
  includedNamespaces: [ "jellyfin", "qbittorrent", "vaultwarden", "nextcloud" ]

  includedClusterScopedResources:
  - persistentvolumes
  includedNamespaceScopedResources:
  - persistentvolumeclaims

  defaultVolumesToFsBackup: false
  snapshotVolumes: false
  storageLocation: r2-cloudflare
  ttl: 0s # never expires
